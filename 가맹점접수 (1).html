<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>가맹점 접수</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@font-face{
  font-family:'Pretendard';
  src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Regular.woff2') format('woff2');
  font-weight:400; font-display:swap;
}
@font-face{
  font-family:'Pretendard';
  src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Medium.woff2') format('woff2');
  font-weight:500; font-display:swap;
}
@font-face{
  font-family:'Pretendard';
  src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-SemiBold.woff2') format('woff2');
  font-weight:600; font-display:swap;
}
@font-face{
  font-family:'Pretendard';
  src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
  font-weight:700; font-display:swap;
}
@font-face{
  font-family:'Plex Mono';
  src:url('https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-mono@5.0.13/files/ibm-plex-mono-latin-500-normal.woff2') format('woff2');
  font-weight:500; font-display:swap;
}

:root{
  --bg:#F1F3F6;
  --paper:#FFFFFF;
  --ink:#10233D;
  --ink-soft:#5B6B7A;
  --line:#E1E5EA;
  --line-strong:#C7CFD8;
  --teal:#12A398;
  --teal-deep:#0B7A72;
  --amber:#FF9F40;
  --forest:#2F8F5B;
  --forest-bg:#EAF6EF;
  --red:#E24C4C;
  --red-bg:#FDEDED;
  --radius:14px;
  --shadow:0 1px 2px rgba(16,35,61,0.04), 0 8px 24px rgba(16,35,61,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'Plex Mono','Pretendard',monospace;}

#app{max-width:1120px;margin:0 auto;padding:28px 20px 80px;}

/* ---------- top bar ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--teal),var(--teal-deep));
  display:flex;align-items:center;justify-content:center;
  color:white;font-weight:700;font-size:15px;
  box-shadow:var(--shadow);
}
.brand-text{font-weight:700;font-size:16px;letter-spacing:-0.01em;}
.brand-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
.admin-link{font-size:12.5px;color:var(--ink-soft);text-decoration:none;border:1px solid var(--line);padding:7px 12px;border-radius:100px;background:var(--paper);cursor:pointer;transition:.15s;}
.admin-link:hover{border-color:var(--line-strong);color:var(--ink);}

/* ---------- stepper ---------- */
.stepper{display:flex;align-items:center;gap:10px;margin-bottom:26px;}
.step-chip{
  display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);
  padding:8px 14px 8px 10px;border-radius:100px;background:var(--paper);border:1px solid var(--line);
}
.step-chip .num{
  width:20px;height:20px;border-radius:50%;background:var(--line);color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
}
.step-chip.active{background:var(--ink);color:white;border-color:var(--ink);}
.step-chip.active .num{background:var(--teal);color:white;}
.step-chip.done{color:var(--teal-deep);}
.step-chip.done .num{background:var(--forest-bg);color:var(--forest);}
.step-divider{width:20px;height:1px;background:var(--line-strong);}

/* ---------- layout ---------- */
.layout{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;}
@media(max-width:860px){.layout{grid-template-columns:1fr;}}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);
}
.section-title{font-size:17px;font-weight:700;margin:0 0 4px;letter-spacing:-0.01em;}
.section-sub{font-size:13px;color:var(--ink-soft);margin:0 0 18px;line-height:1.5;}

/* ---------- option cards (equipment) ---------- */
.opt-group{margin-bottom:22px;}
.opt-group-label{font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.opt-list{display:grid;gap:10px;}
.opt-card{
  border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;
  display:flex;align-items:flex-start;gap:12px;transition:.12s;position:relative;
}
.opt-card:hover{border-color:var(--line-strong);}
.opt-card.selected{border-color:var(--teal);background:#F1FBFA;}
.opt-card .radio{
  width:18px;height:18px;border-radius:50%;border:2px solid var(--line-strong);flex:0 0 18px;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
}
.opt-card.selected .radio{border-color:var(--teal);}
.opt-card.selected .radio::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--teal);}
.opt-card .box{
  width:18px;height:18px;border-radius:5px;border:2px solid var(--line-strong);flex:0 0 18px;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
}
.opt-card.selected .box{border-color:var(--teal);background:var(--teal);}
.opt-card.selected .box::after{content:'✓';color:white;font-size:12px;font-weight:700;}
.opt-body{flex:1;}
.opt-name{font-size:14.5px;font-weight:600;}
.opt-desc{font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.5;}
.opt-price{font-family:'Plex Mono';font-size:13.5px;font-weight:500;color:var(--teal-deep);white-space:nowrap;padding-left:8px;}

.partner-row{display:flex;gap:8px;margin-top:12px;padding-left:30px;}
.partner-pill{
  flex:1;text-align:center;font-size:12.5px;font-weight:600;padding:9px 6px;border-radius:9px;
  border:1.5px solid var(--line);cursor:pointer;color:var(--ink-soft);transition:.12s;
}
.partner-pill:hover{border-color:var(--line-strong);}
.partner-pill.selected{border-color:var(--ink);background:var(--ink);color:white;}

/* ---------- receipt summary (signature element) ---------- */
.receipt-wrap{position:sticky;top:20px;}
.receipt{
  background:var(--paper);border:1px solid var(--line);border-radius:2px;
  box-shadow:var(--shadow);position:relative;padding:22px 20px 18px;
}
.receipt::before,.receipt::after{
  content:'';position:absolute;left:0;right:0;height:9px;
  background-image:linear-gradient(135deg,var(--bg) 50%,transparent 50%),linear-gradient(45deg,var(--bg) 50%,transparent 50%);
  background-size:12px 12px;background-repeat:repeat-x;
}
.receipt::before{top:-9px;background-position:bottom;}
.receipt::after{bottom:-9px;background-image:linear-gradient(-135deg,var(--bg) 50%,transparent 50%),linear-gradient(-45deg,var(--bg) 50%,transparent 50%);background-position:top;}
.receipt-head{text-align:center;margin-bottom:14px;}
.receipt-head .t{font-family:'Plex Mono';font-size:11.5px;letter-spacing:.14em;color:var(--ink-soft);text-transform:uppercase;}
.receipt-head .n{font-size:15px;font-weight:700;margin-top:4px;}
.receipt-divider{border:none;border-top:1.5px dashed var(--line-strong);margin:12px 0;}
.receipt-line{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;gap:8px;}
.receipt-line .l{color:var(--ink-soft);}
.receipt-line .v{font-family:'Plex Mono';font-weight:500;text-align:right;}
.receipt-empty{font-size:12.5px;color:var(--ink-soft);text-align:center;padding:14px 0;}
.receipt-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;}
.receipt-total .l{font-size:13px;font-weight:700;}
.receipt-total .v{font-family:'Plex Mono';font-size:20px;font-weight:700;color:var(--teal-deep);}
.receipt-foot{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:10px;font-family:'Plex Mono';}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:'Pretendard';font-size:14.5px;font-weight:600;padding:13px 20px;border-radius:11px;
  border:none;cursor:pointer;transition:.14s;width:100%;
}
.btn-primary{background:var(--ink);color:white;}
.btn-primary:hover{background:#0A1A2E;}
.btn-primary:disabled{background:var(--line-strong);color:#9AA5B1;cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
.btn-ghost:hover{border-color:var(--line-strong);color:var(--ink);}
.btn-sm{width:auto;padding:8px 14px;font-size:13px;}
.btn-row{display:flex;gap:10px;margin-top:18px;}

/* ---------- form fields ---------- */
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;}
.field .req{color:var(--red);margin-left:2px;}
.field input[type=text],.field input[type=tel],.field input[type=email]{
  width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;
  font-family:'Pretendard';background:#FCFCFD;transition:.12s;
}
.field input:focus{outline:none;border-color:var(--teal);background:white;}
.field-hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.grid2{grid-template-columns:1fr;}}

/* ---------- upload dropzones ---------- */
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.doc-grid{grid-template-columns:1fr;}}
.dropzone{
  border:1.5px dashed var(--line-strong);border-radius:12px;padding:14px;cursor:pointer;
  transition:.14s;position:relative;overflow:hidden;background:#FBFBFC;
}
.dropzone:hover{border-color:var(--teal);background:#F1FBFA;}
.dropzone.filled{border-style:solid;border-color:var(--forest);background:var(--forest-bg);}
.dz-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.dz-title{font-size:13px;font-weight:600;}
.dz-title .req{color:var(--red);}
.dz-status{font-size:11px;color:var(--ink-soft);}
.dz-status.ok{color:var(--forest);font-weight:600;}
.dz-preview{margin-top:9px;display:flex;align-items:center;gap:9px;}
.dz-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--line);flex:0 0 44px;}
.dz-filename{font-size:11.5px;color:var(--ink-soft);word-break:break-all;line-height:1.4;}
.dz-placeholder{font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}
.dz-remove{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;padding:0;margin-left:auto;flex:0 0 auto;}

/* ---------- misc ---------- */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:white;padding:12px 20px;border-radius:100px;font-size:13.5px;font-weight:500;
  box-shadow:var(--shadow);z-index:50;opacity:0;pointer-events:none;transition:.2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.success-wrap{max-width:520px;margin:40px auto;text-align:center;}
.success-badge{
  width:72px;height:72px;border-radius:50%;background:var(--forest-bg);color:var(--forest);
  display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;
}
.success-wrap h2{font-size:21px;margin:0 0 8px;}
.success-wrap p{font-size:14px;color:var(--ink-soft);line-height:1.6;margin:0 0 22px;}
.receipt-num{
  display:inline-block;font-family:'Plex Mono';font-size:14px;background:var(--bg);border:1px solid var(--line);
  border-radius:9px;padding:9px 16px;font-weight:600;letter-spacing:.02em;margin-bottom:24px;
}

/* ---------- admin ---------- */
.admin-login{max-width:360px;margin:60px auto;}
.merchant-card{
  background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px;
  box-shadow:var(--shadow);
}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;}
.mc-name{font-size:15.5px;font-weight:700;}
.mc-meta{font-size:12px;color:var(--ink-soft);margin-top:3px;}
.mc-right{text-align:right;flex:0 0 auto;}
.mc-total{font-family:'Plex Mono';font-weight:700;font-size:15px;color:var(--teal-deep);}
.mc-badge{
  display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px;margin-top:6px;
}
.mc-badge.접수{background:var(--red-bg);color:var(--red);}
.mc-badge.처리중{background:#FFF4E5;color:var(--amber);}
.mc-badge.완료{background:var(--forest-bg);color:var(--forest);}
.mc-detail{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line-strong);display:none;}
.mc-detail.open{display:block;}
.mc-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;font-size:12.5px;}
.mc-detail-grid .l{color:var(--ink-soft);}
.mc-files{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.mc-file{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#FBFBFC;}
.mc-file img{width:100%;height:88px;object-fit:cover;display:block;background:var(--line);}
.mc-file .fname{font-size:10.5px;padding:6px 8px;color:var(--ink-soft);line-height:1.4;}
.mc-file a{display:block;text-decoration:none;color:inherit;}
.status-row{display:flex;gap:8px;margin-top:14px;}
.status-btn{
  flex:1;font-size:12px;font-weight:600;padding:8px;border-radius:8px;border:1.5px solid var(--line);
  background:white;cursor:pointer;color:var(--ink-soft);
}
.status-btn.active{border-color:var(--ink);background:var(--ink);color:white;}
.empty-admin{text-align:center;padding:60px 20px;color:var(--ink-soft);font-size:13.5px;}
.admin-search{
  width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:13.5px;margin-bottom:16px;
  font-family:'Pretendard';
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const EQUIPMENT = {
  base: [
    { id:'pos_set', name:'POS + 금전함 + 영수 프린터 세트', desc:'포스단말, 금전함, 영수증 프린터 풀세트 구성', price:15000 },
    { id:'terminal_set', name:'단말기 세트', desc:'카드 결제 단말기 단독 구성', price:5500 }
  ],
  partners: [
    { id:'naver', name:'네이버 커넥트' },
    { id:'toss', name:'토스 프론트' }
  ],
  addons: [
    { id:'printer', name:'프린터 추가', desc:'영수증 프린터 추가 설치', price:5000 },
    { id:'orderpos', name:'오더포스 추가', desc:'주문 전용 포스 추가 설치', price:10000 }
  ]
};

const DOCS = [
  { key:'idCard', label:'신분증', accept:'image/*', hint:'주민등록증 또는 운전면허증 사진' },
  { key:'bankbook', label:'통장사본', accept:'image/*,.pdf', hint:'입금 계좌 통장 첫 페이지' },
  { key:'bizLicense', label:'사업자등록증', accept:'image/*,.pdf', hint:'사업자등록증 사본' },
  { key:'permitLicense', label:'영업신고증', accept:'image/*,.pdf', hint:'영업신고증(허가증) 사본' },
  { key:'exteriorPhoto', label:'외부 사진 (간판 포함)', accept:'image/*', hint:'간판이 잘 보이도록 촬영' },
  { key:'interiorPhoto', label:'매장 내부 사진', accept:'image/*', hint:'매장 내부 전경' },
  { key:'insideOutsidePhoto', label:'내부에서 외부가 보이는 사진', accept:'image/*', hint:'출입구 방향으로 촬영' }
];

const won = n => n.toLocaleString('ko-KR') + '원';

let state = {
  view: location.hash === '#admin' ? 'adminLogin' : 'step1',
  base: null,
  partner: null,
  addons: { printer:false, orderpos:false },
  fields: { storeName:'', storePhone:'', ownerPhone:'', email:'' },
  files: {},
  receiptId: null,
  adminMerchants: null,
  adminOpen: {},
  adminSearch: ''
};

function toast(msg){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function calcTotal(){
  let total = 0;
  if(state.base){
    const b = EQUIPMENT.base.find(x=>x.id===state.base);
    if(b) total += b.price;
  }
  if(state.addons.printer) total += EQUIPMENT.addons[0].price;
  if(state.addons.orderpos) total += EQUIPMENT.addons[1].price;
  return total;
}

// 브라우저 표준 localStorage를 이용한 안전한 데이터 저장소 구현
const LocalDB = {
  async save(record){
    try {
      let list = [];
      const raw = localStorage.getItem('merchant_index');
      if(raw) list = JSON.parse(raw);
      
      list.unshift({
        id: record.id, 
        storeName: record.fields.storeName, 
        storePhone: record.fields.storePhone,
        createdAt: record.createdAt, 
        total: record.total, 
        base: record.base, 
        partner: record.partner,
        addons: record.addons, 
        status: '접수'
      });
      localStorage.setItem('merchant_index', JSON.stringify(list));
      localStorage.setItem('merchant_detail_' + record.id, JSON.stringify(record));
      return true;
    } catch(e) {
      console.error(e);
      alert('저장 공간이 부족하거나 오류가 발생했습니다. (사진 용량이 너무 클 수 있습니다)');
      return false;
    }
  },
  async getIndex(){
    try {
      const raw = localStorage.getItem('merchant_index');
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  },
  async getDetail(id){
    try {
      const raw = localStorage.getItem('merchant_detail_' + id);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  },
  async updateStatus(id, status){
    let list = await this.getIndex();
    list = list.map(m => m.id === id ? {...m, status} : m);
    localStorage.setItem('merchant_index', JSON.stringify(list));
    return list;
  },
  async markDownloaded(id){
    let list = await this.getIndex();
    list = list.map(m => m.id === id ? {...m, downloadedAt: new Date().toISOString()} : m);
    localStorage.setItem('merchant_index', JSON.stringify(list));
    return list;
  },
  async cleanup(){
    let list = await this.getIndex();
    const today = new Date(); today.setHours(0,0,0,0);
    const kept = [];
    let changed = false;
    for(const m of list){
      if(m.downloadedAt){
        const dDate = new Date(m.downloadedAt); dDate.setHours(0,0,0,0);
        if(today.getTime() > dDate.getTime()){
          localStorage.removeItem('merchant_detail_' + m.id);
          changed = true;
          continue;
        }
      }
      kept.push(m);
    }
    if(changed) localStorage.setItem('merchant_index', JSON.stringify(kept));
    return kept;
  }
};

function readAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function render(){
  const app = document.getElementById('app');
  if(!app) return;
  
  if(state.view === 'step1') app.innerHTML = topbar() + stepper(1) + renderStep1();
  else if(state.view === 'step2') app.innerHTML = topbar() + stepper(2) + renderStep2();
  else if(state.view === 'success') app.innerHTML = topbar() + renderSuccess();
  else if(state.view === 'adminLogin') app.innerHTML = renderAdminLogin();
  else if(state.view === 'admin') app.innerHTML = renderAdmin();
}

function topbar(){
  return `
  <div class="topbar">
    <div class="brand" style="cursor:pointer;" onclick="App.goStep1()">
      <div class="brand-mark">P</div>
      <div>
        <div class="brand-text">가맹점 접수</div>
        <div class="brand-sub">장비 선택 &amp; 서류 제출</div>
      </div>
    </div>
    <div class="admin-link" onclick="App.goAdmin()">관리자 모드</div>
  </div>`;
}

function stepper(n){
  return `
  <div class="stepper">
    <div class="step-chip ${n===1?'active':'done'}"><span class="num">${n>1?'✓':'1'}</span>장비 선택</div>
    <div class="step-divider"></div>
    <div class="step-chip ${n===2?'active':''}"><span class="num">2</span>서류 제출</div>
  </div>`;
}

function receiptSummary(stepLabel){
  const b = EQUIPMENT.base.find(x=>x.id===state.base);
  const p = EQUIPMENT.partners.find(x=>x.id===state.partner);
  const total = calcTotal();
  let lines = '';
  if(b) lines += `<div class="receipt-line"><span class="l">${b.name}</span><span class="v">${won(b.price)}</span></div>`;
  if(p) lines += `<div class="receipt-line"><span class="l">연동사</span><span class="v">${p.name}</span></div>`;
  if(state.addons.printer) lines += `<div class="receipt-line"><span class="l">${EQUIPMENT.addons[0].name}</span><span class="v">${won(EQUIPMENT.addons[0].price)}</span></div>`;
  if(state.addons.orderpos) lines += `<div class="receipt-line"><span class="l">${EQUIPMENT.addons[1].name}</span><span class="v">${won(EQUIPMENT.addons[1].price)}</span></div>`;
  if(!lines) lines = `<div class="receipt-empty">선택된 장비가 없습니다</div>`;

  return `
  <div class="receipt-wrap">
    <div class="receipt">
      <div class="receipt-head">
        <div class="t">Equipment Order</div>
        <div class="n">${state.fields.storeName ? state.fields.storeName : '가맹점 접수 영수증'}</div>
      </div>
      <hr class="receipt-divider">
      ${lines}
      <hr class="receipt-divider">
      <div class="receipt-total"><span class="l">합계 금액</span><span class="v">${won(total)}</span></div>
      <div class="receipt-foot">${stepLabel}</div>
    </div>
  </div>`;
}

function renderStep1(){
  const total = calcTotal();
  const canNext = state.base && state.partner;
  return `
  <div class="layout">
    <div class="card">
      <div class="section-title">설치할 장비를 선택해 주세요</div>
      <div class="section-sub">기본 구성 중 하나를 선택하고, 연동할 결제사를 골라주세요. 필요한 경우 추가 옵션을 함께 선택할 수 있습니다.</div>

      <div class="opt-group">
        <div class="opt-group-label">1. 기본 구성 <span class="req">*</span></div>
        <div class="opt-list">
          ${EQUIPMENT.base.map(b => `
            <div>
              <div class="opt-card ${state.base===b.id?'selected':''}" onclick="App.selectBase('${b.id}')">
                <div class="radio"></div>
                <div class="opt-body">
                  <div class="opt-name">${b.name}</div>
                  <div class="opt-desc">${b.desc}</div>
                </div>
                <div class="opt-price">${won(b.price)}</div>
              </div>
              ${state.base===b.id ? `
                <div class="partner-row">
                  ${EQUIPMENT.partners.map(p => `
                    <div class="partner-pill ${state.partner===p.id?'selected':''}" onclick="event.stopPropagation();App.selectPartner('${p.id}')">${p.name}</div>
                  `).join('')}
                </div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>

      <div class="opt-group">
        <div class="opt-group-label">2. 추가 옵션 <span style="font-weight:400;color:var(--ink-soft);">(선택)</span></div>
        <div class="opt-list">
          ${EQUIPMENT.addons.map((a,i) => {
            const key = i===0?'printer':'orderpos';
            return `
            <div class="opt-card ${state.addons[key]?'selected':''}" onclick="App.toggleAddon('${key}')">
              <div class="box"></div>
              <div class="opt-body">
                <div class="opt-name">${a.name}</div>
                <div class="opt-desc">${a.desc}</div>
              </div>
              <div class="opt-price">+${won(a.price)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" ${canNext?'':'disabled'} onclick="App.goStep2()">서류 제출로 이동</button>
      </div>
      ${!canNext ? '<div class="field-hint" style="margin-top:8px;">기본 구성과 연동사를 선택하면 다음 단계로 진행할 수 있어요.</div>' : ''}
    </div>
    ${receiptSummary(total>0 ? '선택을 완료하면 다음 단계로 이동합니다' : '왼쪽에서 장비를 선택해 주세요')}
  </div>`;
}

function renderStep2(){
  const f = state.fields;
  const filledCount = DOCS.filter(d=>state.files[d.key]).length;
  return `
  <div class="layout">
    <div class="card">
      <div class="section-title">가맹점 정보 및 서류 제출</div>
      <div class="section-sub">아래 정보를 입력하고 필요 서류를 첨부해 주세요.</div>

      <div class="field">
        <label>상호명(매장명) <span class="req">*</span></label>
        <input type="text" id="f_storeName" placeholder="예: 카페 온기" value="${f.storeName}" oninput="App.updateField('storeName', this.value)">
      </div>
      <div class="grid2">
        <div class="field">
          <label>매장전화번호 <span class="req">*</span></label>
          <input type="tel" id="f_storePhone" placeholder="02-1234-5678" value="${f.storePhone}" oninput="App.updateField('storePhone', this.value)">
        </div>
        <div class="field">
          <label>대표명의 폰번호 <span class="req">*</span></label>
          <input type="tel" id="f_ownerPhone" placeholder="010-1234-5678" value="${f.ownerPhone}" oninput="App.updateField('ownerPhone', this.value)">
        </div>
      </div>
      <div class="field">
        <label>메일주소 <span class="req">*</span></label>
        <input type="email" id="f_email" placeholder="example@email.com" value="${f.email}" oninput="App.updateField('email', this.value)">
      </div>

      <div class="opt-group-label" style="margin-top:22px;">필요 서류 (${filledCount}/${DOCS.length}) <span class="req">*</span></div>
      <div class="doc-grid">
        ${DOCS.map(d => renderDropzone(d)).join('')}
      </div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="App.goStep1()">이전</button>
        <button class="btn btn-primary" onclick="App.submit()">접수 제출하기</button>
      </div>
    </div>
    ${receiptSummary('입력을 마치면 접수를 제출해 주세요')}
  </div>`;
}

function renderDropzone(d){
  const f = state.files[d.key];
  return `
  <div class="dropzone ${f?'filled':''}" onclick="document.getElementById('file_${d.key}').click()">
    <input type="file" id="file_${d.key}" accept="${d.accept}" style="display:none" onchange="App.handleFile('${d.key}', this)">
    <div class="dz-head">
      <div class="dz-title">${d.label} <span class="req">*</span></div>
      <div class="dz-status ${f?'ok':''}">${f?'첨부완료':'미첨부'}</div>
    </div>
    ${f ? `
      <div class="dz-preview">
        ${f.isImage ? `<img class="dz-thumb" src="${f.dataUrl}">` : `<div class="dz-thumb" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-soft);">FILE</div>`}
        <div class="dz-filename">${f.name}</div>
        <button class="dz-remove" onclick="event.stopPropagation();App.removeFile('${d.key}')">삭제</button>
      </div>
    ` : `<div class="dz-placeholder">${d.hint}</div>`}
  </div>`;
}

function renderSuccess(){
  return `
  <div class="success-wrap">
    <div class="success-badge">✓</div>
    <h2>접수가 완료되었습니다</h2>
    <p>${state.fields.storeName} 가맹점 정보와 서류가 안전하게 저장되었습니다.<br>담당자가 확인 후 순차적으로 연락드릴 예정입니다.</p>
    <div class="receipt-num">접수번호 ${state.receiptId}</div>
    <div>
      <button class="btn btn-ghost" onclick="App.resetAll()">새로운 가맹점 접수하기</button>
    </div>
  </div>`;
}

function renderAdminLogin(){
  return `
  <div class="admin-login card">
    <div class="section-title">사업자 확인</div>
    <div class="section-sub">접수된 가맹점 목록을 확인하려면 접근 코드를 입력하세요.</div>
    <div class="field">
      <input type="password" id="admin_pass" placeholder="접근 코드" style="width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;">
    </div>
    <button class="btn btn-primary" onclick="App.tryAdminLogin()">확인</button>
    <div style="text-align:center;margin-top:14px;">
      <span style="font-size:12.5px;color:var(--ink-soft);cursor:pointer;" onclick="App.goStep1()">← 접수 화면으로 돌아가기</span>
    </div>
  </div>`;
}

function renderAdmin(){
  const list = (state.adminMerchants || []).filter(m => {
    if(!state.adminSearch) return true;
    const q = state.adminSearch.toLowerCase();
    return (m.storeName||'').toLowerCase().includes(q) || (m.storePhone||'').includes(q);
  });
  return `
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div>
        <div class="brand-text">가맹점 접수 현황</div>
        <div class="brand-sub">총 ${state.adminMerchants ? state.adminMerchants.length : 0}건 접수됨</div>
      </div>
    </div>
    <div class="admin-link" onclick="App.goStep1()">접수 화면 보기</div>
  </div>
  <input class="admin-search" placeholder="상호명 또는 전화번호로 검색" value="${state.adminSearch}" oninput="App.setAdminSearch(this.value)">
  ${list.length===0 ? `<div class="empty-admin card">접수된 가맹점이 없습니다.</div>` :
    list.map(m => renderMerchantCard(m)).join('')
  }`;
}

function renderMerchantCard(m){
  const open = !!state.adminOpen[m.id];
  const detail = state.adminOpen[m.id + '_detail'];
  const baseInfo = EQUIPMENT.base.find(x=>x.id===m.base);
  const partnerInfo = EQUIPMENT.partners.find(x=>x.id===m.partner);
  return `
  <div class="merchant-card">
    <div class="mc-top" onclick="App.toggleMerchant('${m.id}')">
      <div>
        <div class="mc-name">${m.storeName || '(상호명 미입력)'}</div>
        <div class="mc-meta">${m.storePhone || ''} · ${new Date(m.createdAt).toLocaleString('ko-KR')}</div>
        <div class="mc-meta">${baseInfo?baseInfo.name:''} ${partnerInfo? '· '+partnerInfo.name:''}</div>
      </div>
      <div class="mc-right">
        <div class="mc-total">${won(m.total||0)}</div>
        <div class="mc-badge ${m.status||'접수'}">${m.status||'접수'}</div>
        ${m.downloadedAt ? `<div class="mc-meta" style="color:var(--red);margin-top:4px;">${new Date(m.downloadedAt).toLocaleDateString('ko-KR')} 다운로드됨</div>` : `<div class="mc-meta" style="margin-top:4px;">미다운로드</div>`}
      </div>
    </div>
    <div class="mc-detail ${open?'open':''}" id="detail_${m.id}">
      ${open ? renderMerchantDetail(m, detail) : ''}
    </div>
  </div>`;
}

function renderMerchantDetail(m, detail){
  if(!detail) return `<div style="font-size:12.5px;color:var(--ink-soft);">불러오는 중...</div>`;
  const f = detail.fields || {};
  const addonNames = [];
  if(detail.addons && detail.addons.printer) addonNames.push('프린터 추가');
  if(detail.addons && detail.addons.orderpos) addonNames.push('오더포스 추가');
  return `
  <div class="mc-detail-grid">
    <div><span class="l">매장전화번호</span><br>${f.storePhone||'-'}</div>
    <div><span class="l">대표명의 폰번호</span><br>${f.ownerPhone||'-'}</div>
    <div><span class="l">메일주소</span><br>${f.email||'-'}</div>
    <div><span class="l">추가옵션</span><br>${addonNames.length?addonNames.join(', '):'없음'}</div>
  </div>
  <div class="mc-files">
    ${DOCS.map(d => {
      const fileObj = detail.files && detail.files[d.key];
      if(!fileObj) return `<div class="mc-file"><div class="fname" style="padding:12px 8px;text-align:center;color:var(--red);">${d.label}<br>파일 없음</div></div>`;
      return fileObj.isImage
        ? `<div class="mc-file"><a href="${fileObj.dataUrl}" download="${fileObj.name}"><img src="${fileObj.dataUrl}"><div class="fname">${d.label}</div></a></div>`
        : `<div class="mc-file"><a href="${fileObj.dataUrl}" download="${fileObj.name}"><div class="fname" style="padding:16px 8px;text-align:center;">📄<br>${d.label}</div></a></div>`;
    }).join('')}
  </div>
  <div class="status-row">
    ${['접수','처리중','완료'].map(s => `<button class="status-btn ${m.status===s?'active':''}" onclick="event.stopPropagation();App.setStatus('${m.id}','${s}')">${s}</button>`).join('')}
  </div>
  <div class="status-row">
    <button class="status-btn" style="flex:none;padding:8px 16px;color:var(--teal-deep);border-color:var(--teal);" onclick="event.stopPropagation();App.downloadAll('${m.id}','${(f.storeName||'').replace(/'/g,"")}')">⬇ 전체 서류 다운로드</button>
  </div>`;
}

const App = {
  selectBase(id){ state.base = id; state.partner = null; render(); },
  selectPartner(id){ state.partner = id; render(); },
  toggleAddon(key){ state.addons[key] = !state.addons[key]; render(); },
  updateField(key, val){ state.fields[key] = val; },
  goStep2(){
    if(!state.base || !state.partner){ toast('기본 구성과 연동사를 선택해 주세요'); return; }
    state.view = 'step2'; render();
  },
  goStep1(){ location.hash=''; state.view='step1'; render(); },

  async handleFile(key, inputEl){
    const file = inputEl.files[0];
    if(!file) return;
    const docDef = DOCS.find(d=>d.key===key);
    if(file.size > 10*1024*1024){ toast('파일 용량이 너무 큽니다 (10MB 이하)'); inputEl.value=''; return; }
    toast('파일 읽는 중...');
    try{
      const isImage = file.type.startsWith('image/');
      const dataUrl = await readAsDataURL(file);
      state.files[key] = { name:file.name, dataUrl, isImage };
      render();
      toast(docDef.label + ' 첨부 완료');
    }catch(e){
      toast('파일 처리 중 오류가 발생했습니다');
    }
  },
  removeFile(key){ delete state.files[key]; render(); },

  async submit(){
    const f = state.fields;
    if(!f.storeName || !f.storePhone || !f.ownerPhone || !f.email){
      toast('필수 정보를 모두 입력해 주세요'); return;
    }
    const missing = DOCS.filter(d => !state.files[d.key]);
    if(missing.length > 0){
      toast(missing[0].label + ' 등 필요 서류를 첨부해 주세요'); return;
    }
    const submitBtn = document.querySelector('.btn-primary');
    if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = '제출 중...'; }

    const id = 'F' + new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,14) + '-' + Math.floor(Math.random()*900+100);
    const record = {
      id, createdAt: new Date().toISOString(),
      base: state.base, partner: state.partner, addons: {...state.addons},
      total: calcTotal(), fields: {...state.fields}, files: {...state.files}
    };
    
    const success = await LocalDB.save(record);
    if(success){
      state.receiptId = id;
      state.view = 'success';
      render();
    } else {
      if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = '접수 제출하기'; }
    }
  },

  resetAll(){
    state = { view:'step1', base:null, partner:null, addons:{printer:false,orderpos:false},
      fields:{storeName:'',storePhone:'',ownerPhone:'',email:''}, files:{}, receiptId:null,
      adminMerchants:null, adminOpen:{}, adminSearch:'' };
    location.hash=''; render();
  },

  goAdmin(){ location.hash='admin'; state.view='adminLogin'; render(); },
  async tryAdminLogin(){
    const val = document.getElementById('admin_pass').value;
    if(val === 'pos1212!@'){
      toast('접수 내역 불러오는 중...');
      state.adminMerchants = await LocalDB.cleanup();
      state.view = 'admin'; render();
    } else { toast('접근 코드가 올바르지 않습니다'); }
  },
  setAdminSearch(v){ state.adminSearch = v; render(); },

  async toggleMerchant(id){
    if(state.adminOpen[id]){ state.adminOpen[id] = false; render(); return; }
    state.adminOpen[id] = true;
    const detail = await LocalDB.getDetail(id);
    state.adminOpen[id + '_detail'] = detail;
    render();
  },

  async setStatus(id, status){
    const list = await LocalDB.updateStatus(id, status);
    state.adminMerchants = list;
    render();
  },

  async downloadAll(id, storeName){
    const detail = await LocalDB.getDetail(id);
    if(!detail || !detail.files) { toast('서류 파일이 없습니다.'); return; }
    
    toast('서류 다운로드 중...');
    for(const d of DOCS){
      const f = detail.files[d.key];
      if(f){
        const a = document.createElement('a');
        a.href = f.dataUrl;
        a.download = (storeName || id) + '_' + d.label + '_' + f.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        await new Promise(r => setTimeout(r, 300));
      }
    }
    await LocalDB.markDownloaded(id);
    state.adminMerchants = await LocalDB.getIndex();
    toast('모든 서류 다운로드 완료');
    render();
  }
};
window.App = App;

render();
</script>
</body>
</html>
