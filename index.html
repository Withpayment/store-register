<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>가맹점 서류 접수</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
@font-face{
  font-family:'Pretendard';
  src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Regular.woff2') format('woff2');
  font-weight:400; font-display:swap;
}
@font-face{
  font-family:'Pretendard';
  src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
  font-weight:700; font-display:swap;
}
@font-face{
  font-family:'Plex Mono';
  src:url('https://cdn.jsdelivr.net/npm/@fontsource/ibm-plex-mono@5.0.13/files/ibm-plex-mono-latin-500-normal.woff2') format('woff2');
  font-weight:500; font-display:swap;
}

:root{
  --bg:#F1F3F6;
  --paper:#FFFFFF;
  --ink:#10233D;
  --ink-soft:#5B6B7A;
  --line:#E1E5EA;
  --line-strong:#C7CFD8;
  --teal:#12A398;
  --teal-deep:#0B7A72;
  --forest:#2F8F5B;
  --forest-bg:#EAF6EF;
  --red:#E24C4C;
  --red-bg:#FDEDED;
  --radius:14px;
  --shadow:0 1px 2px rgba(16,35,61,0.04), 0 8px 24px rgba(16,35,61,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'Plex Mono','Pretendard',monospace;}

#app{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--teal),var(--teal-deep));
  display:flex;align-items:center;justify-content:center;
  color:white;font-weight:700;font-size:15px;
  box-shadow:var(--shadow);
}
.brand-text{font-weight:700;font-size:16px;letter-spacing:-0.01em;}
.brand-sub{font-size:12px;color:var(--ink-soft);margin-top:1px;}
.admin-link{font-size:12.5px;color:var(--ink-soft);text-decoration:none;border:1px solid var(--line);padding:7px 12px;border-radius:100px;background:var(--paper);cursor:pointer;transition:.15s;}
.admin-link:hover{border-color:var(--line-strong);color:var(--ink);}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:28px;box-shadow:var(--shadow);
}
.section-title{font-size:18px;font-weight:700;margin:0 0 6px;letter-spacing:-0.01em;}
.section-sub{font-size:13.5px;color:var(--ink-soft);margin:0 0 24px;line-height:1.5;}

.field{margin-bottom:18px;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;}
.field .req{color:var(--red);margin-left:2px;}
.field input[type=text],.field input[type=tel],.field input[type=email],.field select{
  width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;
  font-family:'Pretendard';background:#FCFCFD;transition:.12s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);background:white;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.grid2{grid-template-columns:1fr;}}

.opt-group-label{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.doc-grid{grid-template-columns:1fr;}}
.dropzone{
  border:1.5px dashed var(--line-strong);border-radius:12px;padding:14px;cursor:pointer;
  transition:.14s;position:relative;overflow:hidden;background:#FBFBFC;
}
.dropzone:hover{border-color:var(--teal);background:#F1FBFA;}
.dropzone.filled{border-style:solid;border-color:var(--forest);background:var(--forest-bg);}
.dz-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.dz-title{font-size:13px;font-weight:600;}
.dz-title .req{color:var(--red);}
.dz-status{font-size:11px;color:var(--ink-soft);}
.dz-status.ok{color:var(--forest);font-weight:600;}
.dz-preview{margin-top:9px;display:flex;align-items:center;gap:9px;}
.dz-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--line);flex:0 0 44px;}
.dz-filename{font-size:11.5px;color:var(--ink-soft);word-break:break-all;line-height:1.4;}
.dz-placeholder{font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5;}
.dz-remove{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;padding:0;margin-left:auto;flex:0 0 auto;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  font-family:'Pretendard';font-size:15px;font-weight:600;padding:14px 20px;border-radius:11px;
  border:none;cursor:pointer;transition:.14s;width:100%;
}
.btn-primary{background:var(--ink);color:white;}
.btn-primary:hover{background:#0A1A2E;}
.btn-primary:disabled{background:var(--line-strong);color:#9AA5B1;cursor:not-allowed;}
.btn-row{margin-top:24px;display:flex;gap:10px;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:white;padding:12px 20px;border-radius:100px;font-size:13.5px;font-weight:500;
  box-shadow:var(--shadow);z-index:50;opacity:0;pointer-events:none;transition:.2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.success-wrap{max-width:520px;margin:40px auto;text-align:center;}
.success-badge{
  width:72px;height:72px;border-radius:50%;background:var(--forest-bg);color:var(--forest);
  display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;
}
.success-wrap h2{font-size:22px;margin:0 0 8px;}
.success-wrap p{font-size:14px;color:var(--ink-soft);line-height:1.6;margin:0 0 22px;}
.receipt-num{
  display:inline-block;font-family:'Plex Mono';font-size:14px;background:var(--bg);border:1px solid var(--line);
  border-radius:9px;padding:9px 16px;font-weight:600;letter-spacing:.02em;margin-bottom:24px;
}

.admin-login{max-width:360px;margin:60px auto;}
.admin-search{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:13.5px;margin-bottom:16px;font-family:'Pretendard';}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzymJQHqJXEcduknYh5HEYMWO8D2foA2ah5tzHPmn_hyHrPqIWyW5IWTZlcqHy-AHUn/exec";

const BUSINESS_TYPES = [
  { id: 'general', name: '일반 도소매/서비스업 (일반 사업자)' },
  { id: 'food', name: '음식점 / 카페 / 유흥주점 (식품위생업)' },
  { id: 'beauty', name: '미용실 / 피부샵 / 네일샵 (공중위생업)' },
  { id: 'academy', name: '학원 / 교습소' }
];

const COMMON_DOCS = [
  { key:'idCard', label:'신분증', accept:'image/*', hint:'주민등록증 또는 운전면허증 사진' },
  { key:'bankbook', label:'통장사본', accept:'image/*,.pdf', hint:'입금 계좌 통장 첫 페이지' },
  { key:'bizLicense', label:'사업자등록증', accept:'image/*,.pdf', hint:'사업자등록증 사본' },
  { key:'exteriorPhoto', label:'외부 사진 (간판 포함)', accept:'image/*', hint:'간판이 잘 보이도록 촬영' },
  { key:'interiorPhoto', label:'매장 내부 사진', accept:'image/*', hint:'매장 내부 전경' },
  { key:'insideOutsidePhoto', label:'내부에서 외부가 보이는 사진', accept:'image/*', hint:'출입구 방향으로 촬영' }
];

const EXTRA_DOCS = {
  food: { key:'permitLicense', label:'영업신고증', accept:'image/*,.pdf', hint:'식품영업신고증 사본' },
  beauty: { key:'permitLicense', label:'공중위생 영업신고증', accept:'image/*,.pdf', hint:'영업신고증 사본' },
  academy: { key:'permitLicense', label:'학원(교습소) 설립운영 등록증', accept:'image/*,.pdf', hint:'등록증 사본' }
};

function getRequiredDocs(businessType){
  let docs = [...COMMON_DOCS];
  if(EXTRA_DOCS[businessType]){
    docs.splice(3, 0, EXTRA_DOCS[businessType]);
  }
  return docs;
}

let state = {
  view: location.hash === '#admin' ? 'adminLogin' : 'form',
  fields: { storeName:'', businessType:'general', storePhone:'', ownerPhone:'', email:'' },
  files: {},
  receiptId: null,
  adminUnlocked: false,
  adminMerchants: [],
  adminSearch: ''
};

function syncFields(){
  state.fields.storeName = document.getElementById('f_storeName')?.value || state.fields.storeName;
  state.fields.businessType = document.getElementById('f_businessType')?.value || state.fields.businessType;
  state.fields.storePhone = document.getElementById('f_storePhone')?.value || state.fields.storePhone;
  state.fields.ownerPhone = document.getElementById('f_ownerPhone')?.value || state.fields.ownerPhone;
  state.fields.email = document.getElementById('f_email')?.value || state.fields.email;
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function render(){
  const app = document.getElementById('app');
  if(state.view === 'form') app.innerHTML = topbar() + renderForm();
  else if(state.view === 'success') app.innerHTML = topbar() + renderSuccess();
  else if(state.view === 'adminLogin') app.innerHTML = renderAdminLogin();
  else if(state.view === 'admin') app.innerHTML = renderAdmin();
}

function topbar(){
  return `
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div>
        <div class="brand-text">가맹점 서류 접수</div>
        <div class="brand-sub">정보 입력 및 서류 제출</div>
      </div>
    </div>
    <div class="admin-link" onclick="App.goAdmin()">관리자 모드</div>
  </div>`;
}

function renderForm(){
  const f = state.fields;
  const currentDocs = getRequiredDocs(f.businessType);
  const filledCount = currentDocs.filter(d=>state.files[d.key]).length;

  return `
  <div class="card">
    <div class="section-title">가맹점 정보 및 서류 제출</div>
    <div class="section-sub">업종을 선택하시면 해당 업종에 맞는 필수 서류 항목이 자동으로 안내됩니다.</div>

    <div class="field">
      <label>상호명(매장명) <span class="req">*</span></label>
      <input type="text" id="f_storeName" placeholder="예: 카페 온기" value="${f.storeName}">
    </div>

    <div class="field">
      <label>업종 선택 <span class="req">*</span></label>
      <select id="f_businessType" onchange="App.changeBusinessType(this.value)">
        ${BUSINESS_TYPES.map(b => `<option value="${b.id}" ${f.businessType===b.id?'selected':''}>${b.name}</option>`).join('')}
      </select>
    </div>

    <div class="grid2">
      <div class="field">
        <label>매장전화번호 <span class="req">*</span></label>
        <input type="tel" id="f_storePhone" placeholder="02-1234-5678" value="${f.storePhone}">
      </div>
      <div class="field">
        <label>대표명의 폰번호 <span class="req">*</span></label>
        <input type="tel" id="f_ownerPhone" placeholder="010-1234-5678" value="${f.ownerPhone}">
      </div>
    </div>
    <div class="field">
      <label>메일주소 <span class="req">*</span></label>
      <input type="email" id="f_email" placeholder="example@email.com" value="${f.email}">
    </div>

    <div class="opt-group-label" style="margin-top:26px;">필요 서류 (${filledCount}/${currentDocs.length}) <span class="req">*</span></div>
    <div class="doc-grid">
      ${currentDocs.map(d => renderDropzone(d)).join('')}
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="App.submit()">접수 제출하기</button>
    </div>
  </div>`;
}

function renderDropzone(d){
  const f = state.files[d.key];
  return `
  <div class="dropzone ${f?'filled':''}" onclick="document.getElementById('file_${d.key}').click()">
    <input type="file" id="file_${d.key}" accept="${d.accept}" style="display:none" onchange="App.handleFile('${d.key}', this.files[0])">
    <div class="dz-head">
      <div class="dz-title">${d.label} <span class="req">*</span></div>
      <div class="dz-status ${f?'ok':''}">${f?'첨부완료':'미첨부'}</div>
    </div>
    ${f ? `
      <div class="dz-preview">
        ${f.isImage ? `<img class="dz-thumb" src="${f.dataUrl}">` : `<div class="dz-thumb" style="display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-soft);">FILE</div>`}
        <div class="dz-filename">${f.name}</div>
        <button class="dz-remove" onclick="event.stopPropagation();App.removeFile('${d.key}')">삭제</button>
      </div>
    ` : `<div class="dz-placeholder">${d.hint}</div>`}
  </div>`;
}

function renderSuccess(){
  return `
  <div class="success-wrap">
    <div class="success-badge">✓</div>
    <h2>접수가 완료되었습니다</h2>
    <p>${state.fields.storeName} 가맹점 정보와 서류가 안전하게 접수되었습니다.<br>확인 후 빠르게 연락드리겠습니다.</p>
    <div class="receipt-num">접수번호 ${state.receiptId}</div>
    <div>
      <button class="btn btn-primary" onclick="App.resetAll()" style="width:auto;padding:12px 24px;">새로운 접수하기</button>
    </div>
  </div>`;
}

function renderAdminLogin(){
  return `
  <div class="admin-login card">
    <div class="section-title">관리자 확인</div>
    <div class="section-sub">접수된 가맹점 목록을 확인하려면 접근 코드를 입력하세요.</div>
    <div class="field">
      <input type="text" id="admin_pass" placeholder="접근 코드" style="width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:14.5px;">
    </div>
    <button class="btn btn-primary" onclick="App.tryAdminLogin()">확인</button>
    <div style="text-align:center;margin-top:14px;">
      <span style="font-size:12.5px;color:var(--ink-soft);cursor:pointer;" onclick="App.goForm()">← 접수 화면으로 돌아가기</span>
    </div>
  </div>`;
}

function renderAdmin(){
  const list = (state.adminMerchants || []).filter(m => {
    if(!state.adminSearch) return true;
    const q = state.adminSearch.toLowerCase();
    return (m.storeName||'').toLowerCase().includes(q) || (m.storePhone||'').includes(q);
  });

  return `
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div>
        <div class="brand-text">가맹점 접수 현황 (보안 관리)</div>
        <div class="brand-sub">서류 처리 완료 시 체크하면 데이터가 자동 삭제됩니다.</div>
      </div>
    </div>
    <div style="display:flex; gap:8px;">
      <div class="admin-link" onclick="App.loadGoogleData()" style="background:var(--teal); color:white; border:none;">새로고침</div>
      <div class="admin-link" onclick="App.goForm()">접수 화면 보기</div>
    </div>
  </div>

  <input class="admin-search" placeholder="상호명 또는 전화번호로 검색" value="${state.adminSearch}" oninput="App.setAdminSearch(this.value)">

  <div class="card" style="padding: 0; overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13.5px;">
      <thead>
        <tr style="background: #F8FAFC; border-bottom: 1.5px solid var(--line); color: var(--ink-soft);">
          <th style="padding: 14px 16px;">상호명</th>
          <th style="padding: 14px 16px;">매장 전화</th>
          <th style="padding: 14px 16px;">대표 폰번호</th>
          <th style="padding: 14px 16px;">이메일</th>
          <th style="padding: 14px 16px;">접수일시</th>
          <th style="padding: 14px 16px;">서류 폴더</th>
          <th style="padding: 14px 16px; text-align:center;">처리 완료 / 삭제</th>
        </tr>
      </thead>
      <tbody>
        ${list.length === 0 ? `
          <tr><td colspan="7" style="text-align:center; padding: 40px; color: var(--ink-soft);">접수된 내역이 없습니다.</td></tr>
        ` : list.map(m => {
          let formattedDate = m.createdAt;
          try { formattedDate = new Date(m.createdAt).toLocaleString('ko-KR'); } catch(e){}
          
          let folderBtnHtml = '폴더 없음';
          if (m.files && m.files.startsWith('http')) {
            folderBtnHtml = `<a href="${m.files}" target="_blank" style="background: var(--teal); color: white; padding: 5px 10px; border-radius: 6px; font-weight: 600; text-decoration: none; font-size: 11.5px; display: inline-block;">🔍 폴더 열기</a>`;
          }

          return `
            <tr style="border-bottom: 1px solid var(--line); transition: .1s;">
              <td style="padding: 14px 16px; font-weight: 700;">${m.storeName || ''}</td>
              <td style="padding: 14px 16px;">${m.storePhone || ''}</td>
              <td style="padding: 14px 16px;">${m.ownerPhone || ''}</td>
              <td style="padding: 14px 16px; color: var(--ink-soft);">${m.email || ''}</td>
              <td style="padding: 14px 16px; font-size: 12.5px; color: var(--ink-soft);">${formattedDate}</td>
              <td style="padding: 14px 16px;">${folderBtnHtml}</td>
              <td style="padding: 14px 16px; text-align:center;">
                <button onclick="App.completeAndDelete('${m.id}', '${m.storeName}')" style="background: var(--red); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 11.5px;">처리완료/삭제</button>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

function compressImage(file, maxDim=1600, quality=0.85){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim/width); width = maxDim; }
          else { width = Math.round(width * maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function readAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const App = {
  changeBusinessType(val){
    syncFields();
    state.fields.businessType = val;
    render();
  },

  async handleFile(key, file){
    if(!file) return;
    syncFields();
    const currentDocs = getRequiredDocs(state.fields.businessType);
    const docDef = currentDocs.find(d=>d.key===key);
    if(file.size > 15*1024*1024){ toast('파일 용량이 너무 큽니다 (15MB 이하)'); return; }
    toast('파일 처리 중...');
    try{
      const isImage = file.type.startsWith('image/');
      let dataUrl;
      if(isImage) dataUrl = await compressImage(file);
      else dataUrl = await readAsDataURL(file);
      state.files[key] = { name:file.name, dataUrl, isImage };
      render();
      toast(docDef.label + ' 첨부 완료');
    }catch(e){
      toast('파일 처리 중 오류가 발생했습니다');
    }
  },
  
  removeFile(key){
    syncFields();
    delete state.files[key];
    render();
  },

  async loadGoogleData() {
    toast('구글 시트에서 최신 데이터를 불러오는 중...');
    try {
      const response = await fetch(API_URL);
      const result = await response.json();
      if(result.status === 'success') {
        state.adminMerchants = result.data || [];
        render();
        toast('최신 데이터 동기화 완료!');
      } else {
        toast('데이터 불러오기 실패');
      }
    } catch(e) {
      toast('서버 통신 오류');
    }
  },

  async completeAndDelete(id, storeName) {
    if(!confirm(`[${storeName}] 가맹점 서류 확인 및 접수 처리를 완료하셨습니까?\n확인을 누르면 시트 내역과 드라이브의 모든 사진 파일이 개인정보 보호를 위해 영구 삭제됩니다.`)) {
      return;
    }

    toast('처리 완료 및 데이터 삭제 중...');
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'deleteMerchant', id: id })
      });
      const result = await response.json();

      if(result.status === 'success') {
        toast('처리가 완료되어 해당 정보와 파일이 안전하게 삭제되었습니다.');
        App.loadGoogleData();
      } else {
        toast('삭제 처리에 실패했습니다.');
      }
    } catch(e) {
      toast('서버 통신 오류가 발생했습니다.');
    }
  },

  async submit(){
    syncFields();
    const f = state.fields;
    if(!f.storeName || !f.storePhone || !f.ownerPhone || !f.email){
      toast('필수 정보를 모두 입력해 주세요'); return;
    }
    const currentDocs = getRequiredDocs(f.businessType);
    const missing = currentDocs.filter(d => !state.files[d.key]);
    if(missing.length > 0){
      toast(missing[0].label + ' 등 필요 서류를 첨부해 주세요'); return;
    }
    const submitBtn = document.querySelector('.btn-primary');
    if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = '제출 중...'; }

    const id = 'F' + new Date().toISOString().replace(/[-:.TZ]/g,'').slice(0,14) + '-' + Math.floor(Math.random()*900+100);
    const createdAt = new Date().toISOString();

    try {
      const payload = {
        id: id,
        createdAt: createdAt,
        storeName: f.storeName,
        storePhone: f.storePhone,
        ownerPhone: f.ownerPhone,
        email: f.email,
        filesData: state.files
      };

      await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      state.receiptId = id;
      state.files = {};
      state.fields = { storeName:'', businessType:'general', storePhone:'', ownerPhone:'', email:'' };
      state.view = 'success';
      render();
    } catch(e) {
      toast('저장 중 오류가 발생했습니다. 다시 시도해 주세요.');
      if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = '접수 제출하기'; }
    }
  },

  resetAll(){
    state = { view:'form', fields:{storeName:'',businessType:'general',storePhone:'',ownerPhone:'',email:''}, files:{}, receiptId:null, adminUnlocked:false, adminMerchants:[], adminSearch:'' };
    location.hash='';
    render();
  },

  goForm(){ location.hash=''; state.view='form'; render(); },
  goAdmin(){ location.hash='admin'; state.view='adminLogin'; render(); },

  async tryAdminLogin(){
    const val = document.getElementById('admin_pass').value;
    if(val === 'pos1212!@'){
      state.adminUnlocked = true;
      App.loadGoogleData();
      state.view = 'admin';
      render();
    } else {
      toast('접근 코드가 올바르지 않습니다');
    }
  },

  setAdminSearch(v){ state.adminSearch = v; render(); }
};
window.App = App;

render();
</script>
</body>
</html>
